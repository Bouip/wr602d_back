name: CI

on:
  push:
    branches: [master, develop, feature/*]
  pull_request:
    branches: [master, develop]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-progress
      - run: vendor/bin/phpstan analyse src --level=3

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wr602d_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-progress
      - name: Setup env
        run: |
          echo 'DATABASE_URL="mysql://root:root@127.0.0.1:3306/wr602d_test?serverVersion=8.0.37"' > .env.test.local
          echo 'MAILER_SERVICE_URL=http://localhost:8001' >> .env.test.local
          echo 'MAILER_API_KEY_NAME=X-API-KEY' >> .env.test.local
          echo 'MAILER_API_KEY_VALUE=supersecretkey' >> .env.test.local
          echo 'JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem' >> .env.test.local
          echo 'JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem' >> .env.test.local
          echo 'JWT_PASSPHRASE=test' >> .env.test.local
      - run: php bin/console doctrine:database:create --env=test
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console lexik:jwt:generate-keypair --env=test
      - name: Install Symfony CLI
        run: curl -sS https://get.symfony.com/cli/installer | bash && echo "$HOME/.symfony5/bin" >> $GITHUB_PATH
      - name: Start Symfony server
        run: symfony server:start --no-tls --port=8000 --daemon
      - name: Wait for server
        run: sleep 5
      - run: php bin/phpunit tests/Api/ScoreApiTest.php