name: CI

on:
  push:
    branches: [master, develop, feature/*]
  pull_request:
    branches: [master, develop]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-progress
      - run: vendor/bin/phpstan analyse src --level=3

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wr602d_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-progress
      - name: Setup env
        run: |
          cp .env .env.local
          echo 'DATABASE_URL="mysql://root:root@127.0.0.1:3306/wr602d_test?serverVersion=8.0.37"' >> .env.local
          echo 'MAILER_SERVICE_URL=http://localhost:8001' >> .env.local
          echo 'MAILER_API_KEY_NAME=X-API-KEY' >> .env.local
          echo 'MAILER_API_KEY_VALUE=supersecretkey' >> .env.local
      - run: php bin/console doctrine:database:create --env=test
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console lexik:jwt:generate-keypair --env=test
      - run: php bin/phpunit tests/Api/ScoreApiTest.php
      